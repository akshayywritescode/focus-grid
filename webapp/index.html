<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Grid</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <header class="toolbar">
      <input type="file" id="imageUpload" accept="image/*" />

      <div class="grid-controls">
        <input type="number" id="rows" value="4" min="1" max="20" />
        <input type="number" id="cols" value="4" min="1" max="20" />
      </div>
    </header>
    <label for="gridColor">Grid Color:</label>
    <select id="gridColor">
        <option value="black">Black</option>
        <option value="white">White</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
    </select>

    <label for="gridWidth">Grid Thickness:</label>
    <input type="range" id="gridWidth" min="1" max="5" step="0.5" value="1.5">
    <span id="gridWidthValue">1.5</span> px

    <main class="canvas-wrapper">
      <canvas id="canvas"></canvas>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
